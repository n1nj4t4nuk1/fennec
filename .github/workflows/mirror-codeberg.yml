name: Mirror to Codeberg

on:
  push:
    branches: ['**']
    tags: ['**']

jobs:
  mirror:
    name: Push to Codeberg
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch all branches
        run: |
          git fetch --prune --no-tags origin '+refs/heads/*:refs/heads/*' || true
          git fetch --tags origin

      - name: Push to Codeberg
        env:
          CODEBERG_TOKEN: ${{ secrets.MIRROR_CODEBERG_TOKEN }}
        run: |
          set -euo pipefail
          TOKEN="$(printf '%s' "${CODEBERG_TOKEN}" | tr -d '[:space:]')"
          git remote add codeberg "https://n1nj4t4nuk1:${TOKEN}@codeberg.org/n1nj4t4nuk1/fennec.git"
          git push --force codeberg 'refs/heads/*:refs/heads/*'
          git push --force --tags codeberg
